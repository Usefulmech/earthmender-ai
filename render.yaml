services:
  - type: web
    name: earthmender-ai
    runtime: python
    buildCommand: apt-get update -y && apt-get install -y libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender1 && pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
